name: blight
description: BLight - Contrôle domotique intelligent
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Communication locale ESP
  http: ^1.1.0
  bonsoir: ^5.1.6          # ✅ mDNS discovery (Android + iOS)

  # UI & State
  shared_preferences: ^2.2.2
  equatable: ^2.0.5
  flutter_bloc: ^8.1.3

  # Cloud (prévu étape Firebase)
  firebase_core: ^2.24.2
  firebase_database: ^10.4.0

  # Thème
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
